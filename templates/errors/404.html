{% extends "base.html" %}

{% block title %}Page Not Found (404){% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 text-center">
        <div class="glass-panel p-5 border-start border-warning border-4">
            <div class="text-warning mb-4">
                <i class="fa-solid fa-ghost fs-1" style="font-size: 5rem !important;"></i>
            </div>
            <h1 class="fw-bold text-dark mb-3">404 - Page Not Found</h1>
            <p class="text-secondary fs-5 mb-4">The route or page you are searching for does not exist or has been relocated.</p>
            <a href="{{ url_for('home') }}" class="btn btn-premium px-4 py-2">
                <i class="fa-solid fa-house me-2"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
