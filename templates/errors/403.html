{% extends "base.html" %}

{% block title %}Access Denied (403){% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 text-center">
        <div class="glass-panel p-5 border-start border-danger border-4">
            <div class="text-danger mb-4">
                <i class="fa-solid fa-triangle-exclamation fs-1" style="font-size: 5rem !important;"></i>
            </div>
            <h1 class="fw-bold text-dark mb-3">403 - Access Denied</h1>
            <p class="text-secondary fs-5 mb-4">Security Restriction: Your user role does not possess the credentials or permissions required to view this resource.</p>
            <a href="{{ url_for('home') }}" class="btn btn-premium px-4 py-2">
                <i class="fa-solid fa-house me-2"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
