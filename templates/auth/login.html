{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 65vh;">
    <div class="col-md-5">
        <div class="glass-panel p-5 shadow-lg">
            <div class="text-center mb-4">
                <div class="bg-primary bg-gradient text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 70px; height: 70px; box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);">
                    <i class="fa-solid fa-lock fs-3"></i>
                </div>
                <h2 class="mt-3 fw-bold text-dark">Portal Log In</h2>
                <p class="text-muted">Enter credentials to access the Portal</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}">
                <!-- Username -->
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="username">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" id="username" name="username" class="form-control form-control-premium border-start-0" placeholder="Enter Username" required>
                    </div>
                </div>
                
                <!-- Password -->
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="fa-solid fa-key text-muted"></i></span>
                        <input type="password" id="password" name="password" class="form-control form-control-premium border-start-0" placeholder="Enter Password" required>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-premium py-2 fs-5 shadow">
                        <i class="fa-solid fa-right-to-bracket me-2"></i> Log In
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
